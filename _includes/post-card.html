<div id="post-list" class="flex-grow-1 px-xl-1">
<article class="card-wrapper card">
<a href="{{ include.post.url | relative_url }}" class="post-preview row g-0 flex-md-row-reverse">
<div class="col-md-5">
<img src="{{ include.post.image.path | default: include.post.image }}" alt="{{ include.post.image.alt | xml_escape | default: 'Preview Image' }}">
</div>
<div class="col-md-7">
<div class="card-body d-flex flex-column">
<h1 class="card-title my-2 mt-md-0">{{ include.post.title }}</h1>
<div class="card-text content mt-0 mb-3">
<p>{{ include.post.excerpt | strip_html | truncate: 200 }}</p>
</div>
<div class="post-meta flex-grow-1 d-flex align-items-end">
<div class="me-auto">
<i class="far fa-calendar fa-fw me-1"></i>
{{ include.post.date | date: "%b %d, %Y" }}
{% if include.post.categories.size > 0 %}
<i class="far fa-folder-open fa-fw me-1"></i>
<span class="categories">{{ include.post.categories | join: ", " }}</span>
{% endif %}
</div>
</div>
</div>
</div>
</a>
</article>
</div>
